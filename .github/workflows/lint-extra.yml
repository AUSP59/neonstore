name: lint-extra
true:
  pull_request: null
  push:
    branches:
    - main
jobs:
  codespell:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: codespell-project/actions-codespell@v2
    continue-on-error: true
  shellcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: ShellCheck
      run: 'sudo apt-get update && sudo apt-get install -y shellcheck

        shellcheck -e SC1091 $(git ls-files ''*.sh'')

        '
    continue-on-error: true
  hadolint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: hadolint/hadolint-action@v3.3.0
      with:
        dockerfile: Dockerfile
    continue-on-error: true
  gitleaks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: gitleaks/gitleaks-action@v2
      with:
        args: detect --no-banner --redact
    continue-on-error: true
  clang-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check formatting
      run: 'pipx install clang-format==18.1.3 || true

        git ls-files | egrep ''\.(c|cc|cpp|h|hpp)$'' | xargs -I{} bash -c ''diff -u
        <(cat "{}") <(clang-format -style=file "{}")'' || (echo "Run clang-format"
        && exit 1)

        '
    continue-on-error: true
'on':
  push:
    branches:
    - main
    - master
  pull_request:
    branches:
    - main
    - master
