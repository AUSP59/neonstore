name: manpage
true:
  workflow_dispatch: null
  push:
    branches:
    - main
jobs:
  man:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install help2man
      run: sudo apt-get update && sudo apt-get install -y help2man
    - name: Build CLI
      run: 'cmake -S . -B build  -DCMAKE_BUILD_TYPE=Release

        cmake --build build -j

        '
    - name: Generate manpage
      run: 'mkdir -p docs/man

        NEON=$(find build -type f -perm -111 -name neonstore -print -quit) && echo
        "NEON=$NEON" && test -n "$NEON"; help2man -N -n "World-class store management
        CLI" "$NEON" > docs/man/neonstore.1

        '
    - uses: actions/upload-artifact@v4
      with:
        name: man-neonstore
        path: docs/man/neonstore.1
    continue-on-error: true
'on':
  workflow_dispatch: null
