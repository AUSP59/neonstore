name: semgrep
true:
  pull_request: null
  push:
    branches:
    - main
jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: returntocorp/semgrep-action@v1
      with:
        generateSarif: true
    - uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: semgrep.sarif
    continue-on-error: true
'on':
  workflow_dispatch: null
