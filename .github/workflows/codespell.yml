name: codespell
true:
- push
- pull_request
jobs:
  codespell:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: codespell-project/actions-codespell@v2
      with:
        ignore_words_list: 'crate,statics,crate::'
        check_filenames: true
        check_hidden: true
    continue-on-error: true
'on':
  push:
    branches:
    - main
    - master
  pull_request:
    branches:
    - main
    - master
