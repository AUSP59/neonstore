name: slsa-provenance
true:
  release:
    types:
    - published
permissions:
  id-token: write
  contents: read
jobs:
  provenance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: slsa-framework/slsa-github-generator/actions/upload-artifact@v2
      with:
        artifact_path: build/*.zip
    continue-on-error: true
'on':
  push:
    branches:
    - main
    - master
  pull_request:
    branches:
    - main
    - master
