name: cppcheck
true:
- push
- pull_request
jobs:
  cppcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install cppcheck
      run: sudo apt-get update && sudo apt-get install -y cppcheck
    - name: Run cppcheck
      run: 'cppcheck --enable=all --inline-suppr --error-exitcode=1             --std=c++20
        --language=c++ --suppress=missingIncludeSystem             -I include -I src
        .

        '
    continue-on-error: true
'on':
  workflow_dispatch: null
